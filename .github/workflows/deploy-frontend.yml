name: Verify and Deploy Frontend

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# The workflow only reads repository contents. Deployment credentials are
# injected separately as GitHub Actions secrets.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      VITE_POCKETBASE_URL: https://api.husam.ru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # Never cancel a running rsync halfway through a deployment.
    concurrency:
      group: deploy-frontend-production
      cancel-in-progress: false

    env:
      VITE_POCKETBASE_URL: https://api.husam.ru
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs dist/sitemap.xml
        env:
          POCKETBASE_URL: https://api.husam.ru

      - name: Configure SSH
        run: |
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "VPS_SSH_KEY is not configured."
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Verified from the VPS during the security hardening on 2026-07-10.
          # Update this line deliberately if the VPS SSH host key is rotated.
          printf '%s\n' '77.222.63.88 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP7No0tmfhptHSI3OgwMUmFIYWpWuATJqWlx99fWtx0y' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          rsync -az --delete-delay \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist/ deploy@77.222.63.88:/var/www/husam-stroy/
