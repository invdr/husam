name: Deploy Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VITE_POCKETBASE_URL: https://api.husam.ru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs dist/sitemap.xml
        env:
          POCKETBASE_URL: https://api.husam.ru

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            # Зафиксированный ключ хоста (вывод `ssh-keyscan -H 77.222.63.88`) —
            # защищает деплой от подмены хоста (MITM).
            printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            # Fallback: доверие при первом использовании. Рекомендуется задать
            # секрет VPS_KNOWN_HOSTS, чтобы не сканировать ключ на каждом деплое.
            ssh-keyscan -H 77.222.63.88 >> ~/.ssh/known_hosts
          fi

      - name: Deploy to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ deploy@77.222.63.88:/var/www/husam-stroy/
